name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer deps
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist

      - name: PHP syntax check (all src files)
        run: |
          find app/ -name '*.php' -exec php -l {} \; | grep -v 'No syntax errors'
          find config/ -name '*.php' -exec php -l {} \; | grep -v 'No syntax errors'
          find routes/ -name '*.php' -exec php -l {} \; | grep -v 'No syntax errors'
          find database/ -name '*.php' -exec php -l {} \; | grep -v 'No syntax errors'
        shell: bash

      - name: Laravel Pint (dry-run)
        run: ./vendor/bin/pint --test --ansi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: npx prettier --check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: apppostgre_test
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
    env:
      APP_ENV: testing
      APP_KEY: ${{ secrets.APP_KEY || 'base256:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
      DB_CONNECTION: pgsql
      DB_HOST: localhost
      DB_PORT: 5432
      DB_DATABASE: apppostgre_test
      DB_USERNAME: appuser
      DB_PASSWORD: apppassword
      CACHE_DRIVER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2
          extensions: pdo_pgsql

      - name: Cache Composer deps
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-test-${{ hashFiles('composer.lock') }}

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist

      - name: Create storage bootstrap
        run: |
          mkdir -p storage/logs storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache
          chmod -R 777 storage bootstrap/cache

      - name: Generate app key
        run: php artisan key:generate --ansi

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test
